name: Docker CI Pipeline

on:
  push:
    branches: [main]

jobs:
  build-test-scan-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t prad28/mytodoapp:${{ github.sha }} .
          docker tag prad28/mytodoapp:${{ github.sha }} prad28/mytodoapp:latest

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: prad28/mytodoapp:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL

      - name: Push to Docker Hub
        run: |
          docker push prad28/mytodoapp:${{ github.sha }}
          docker push prad28/mytodoapp:latest